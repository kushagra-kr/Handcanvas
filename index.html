<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Draw</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Courier New',monospace; touch-action:none; }

  #video {
    position:fixed; top:0; left:0;
    width:100vw; height:100vh;
    object-fit:cover;
    transform:scaleX(-1);
    opacity:0.15;
  }

  #drawCanvas, #handCanvas {
    position:fixed; top:0; left:0;
    width:100vw; height:100vh;
  }

  #hud {
    position:fixed; top:0; left:0; right:0;
    display:flex; justify-content:space-between;
    padding:16px 20px; z-index:20; pointer-events:none;
  }
  #title { font-size:12px; letter-spacing:.25em; color:rgba(255,220,50,.8); text-transform:uppercase; }
  #info  { font-size:10px; letter-spacing:.15em; color:rgba(255,255,255,.3); text-align:right; line-height:1.8; }

  #controls {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    display:flex; gap:10px; z-index:20;
  }
  .btn {
    background:rgba(255,220,50,.08); border:1px solid rgba(255,220,50,.3);
    color:rgba(255,220,50,.85); font-family:'Courier New',monospace;
    font-size:10px; letter-spacing:.15em; padding:10px 16px;
    border-radius:2px; cursor:pointer; text-transform:uppercase;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active { background:rgba(255,220,50,.2); }

  #tip {
    position:fixed; bottom:72px; left:50%; transform:translateX(-50%);
    font-size:10px; letter-spacing:.18em; color:rgba(255,255,255,.22);
    text-transform:uppercase; white-space:nowrap; z-index:20; pointer-events:none;
  }

  #loader {
    position:fixed; inset:0; background:#000;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; z-index:100;
  }
  #loader-ring {
    width:44px; height:44px;
    border:1px solid rgba(255,220,50,.15);
    border-top-color:rgba(255,220,50,.9);
    border-radius:50%; animation:spin 1s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  #loader-title { font-size:13px; letter-spacing:.3em; color:rgba(255,220,50,.9); text-transform:uppercase; }
  #loader-msg   { font-size:10px; letter-spacing:.15em; color:rgba(255,255,255,.35); text-align:center; line-height:1.9; }
</style>
</head>
<body>

<video id="video" playsinline muted autoplay></video>
<canvas id="drawCanvas"></canvas>
<canvas id="handCanvas"></canvas>

<div id="hud">
  <div id="title">✦ Hand Draw</div>
  <div id="info">
    <span id="fps">— fps</span><br>
    <span id="state">Loading...</span>
  </div>
</div>

<div id="tip">☝ Index finger = draw &nbsp;·&nbsp; ✋ All fingers = pause</div>

<div id="controls">
  <button class="btn" id="clearBtn">Clear</button>
</div>

<div id="loader">
  <div id="loader-ring"></div>
  <div id="loader-title">Hand Draw</div>
  <div id="loader-msg">Loading TensorFlow.js...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.11.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>

<script>
const video      = document.getElementById('video');
const drawCanvas = document.getElementById('drawCanvas');
const handCanvas = document.getElementById('handCanvas');
const dCtx       = drawCanvas.getContext('2d');
const hCtx       = handCanvas.getContext('2d');
const loader     = document.getElementById('loader');
const loaderMsg  = document.getElementById('loader-msg');
const stateEl    = document.getElementById('state');
const fpsEl      = document.getElementById('fps');

let W, H, detector;
let lastPt = null;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  drawCanvas.width = handCanvas.width = W;
  drawCanvas.height = handCanvas.height = H;
}
resize();
window.addEventListener('resize', resize);

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17]
];
const TIPS = [4,8,12,16,20];

// Mirror X because video is CSS-flipped
function sx(kp) { return (1 - kp.x / video.videoWidth)  * W; }
function sy(kp) { return      (kp.y / video.videoHeight) * H; }

function glowLine(ctx,x1,y1,x2,y2,col,lw,blur){
  ctx.save();
  ctx.shadowColor=col; ctx.shadowBlur=blur;
  ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.restore();
}
function glowDot(ctx,x,y,r,col,blur){
  ctx.save();
  ctx.shadowColor=col; ctx.shadowBlur=blur;
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function glowRing(ctx,x,y,r,col,blur){
  ctx.save();
  ctx.shadowColor=col; ctx.shadowBlur=blur;
  ctx.strokeStyle=col; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawSkeleton(kps) {
  hCtx.clearRect(0,0,W,H);
  for(const [a,b] of CONNECTIONS){
    const ax=sx(kps[a]),ay=sy(kps[a]),bx=sx(kps[b]),by=sy(kps[b]);
    glowLine(hCtx,ax,ay,bx,by,'rgba(60,210,255,0.5)',1.5,14);
    glowLine(hCtx,ax,ay,bx,by,'rgba(120,230,255,0.1)',7,32);
  }
  for(let i=0;i<kps.length;i++){
    const x=sx(kps[i]),y=sy(kps[i]);
    glowRing(hCtx,x,y,4.5,'rgba(80,200,255,0.6)',18);
    glowDot (hCtx,x,y,1.8,'rgba(210,245,255,0.95)',8);
  }
  for(const t of TIPS){
    const x=sx(kps[t]),y=sy(kps[t]);
    glowRing(hCtx,x,y,9,'rgba(100,220,255,0.65)',26);
    glowDot (hCtx,x,y,3,'rgba(255,255,255,0.95)',12);
  }
}

function drawSegment(x1,y1,x2,y2){
  dCtx.save();
  dCtx.shadowColor='#ffcc00'; dCtx.shadowBlur=34;
  dCtx.strokeStyle='rgba(255,195,0,0.2)'; dCtx.lineWidth=24;
  dCtx.lineCap='round'; dCtx.lineJoin='round';
  dCtx.beginPath(); dCtx.moveTo(x1,y1); dCtx.lineTo(x2,y2); dCtx.stroke();
  dCtx.restore();

  dCtx.save();
  dCtx.shadowColor='#ffee33'; dCtx.shadowBlur=15;
  dCtx.strokeStyle='rgba(255,228,20,0.7)'; dCtx.lineWidth=6;
  dCtx.lineCap='round'; dCtx.lineJoin='round';
  dCtx.beginPath(); dCtx.moveTo(x1,y1); dCtx.lineTo(x2,y2); dCtx.stroke();
  dCtx.restore();

  dCtx.save();
  dCtx.shadowColor='#ffffff'; dCtx.shadowBlur=6;
  dCtx.strokeStyle='rgba(255,255,200,0.97)'; dCtx.lineWidth=2.2;
  dCtx.lineCap='round'; dCtx.lineJoin='round';
  dCtx.beginPath(); dCtx.moveTo(x1,y1); dCtx.lineTo(x2,y2); dCtx.stroke();
  dCtx.restore();
}

function fade(){
  dCtx.globalCompositeOperation='destination-out';
  dCtx.fillStyle='rgba(0,0,0,0.013)';
  dCtx.fillRect(0,0,W,H);
  dCtx.globalCompositeOperation='source-over';
}

function up(kps,tip,pip){ return kps[tip].y < kps[pip].y; }

let fpsT=performance.now(), fpsN=0;
function tickFPS(){
  fpsN++;
  const now=performance.now();
  if(now-fpsT>700){ fpsEl.textContent=Math.round(fpsN/((now-fpsT)/1000))+' fps'; fpsN=0; fpsT=now; }
}

async function loop(){
  if(video.readyState>=2){
    let hands=[];
    try{ hands=await detector.estimateHands(video,{flipHorizontal:false}); }catch(e){}
    tickFPS();
    fade();
    hCtx.clearRect(0,0,W,H);

    if(hands.length>0){
      const kps=hands[0].keypoints;
      drawSkeleton(kps);

      const idxUp=up(kps,8,6);
      const midUp=up(kps,12,10);
      const rinUp=up(kps,16,14);
      const pinUp=up(kps,20,18);

      if(idxUp&&midUp&&rinUp&&pinUp){
        stateEl.textContent='✋ Pause'; lastPt=null;
      } else if(idxUp){
        stateEl.textContent='☝ Drawing';
        const tx=sx(kps[8]), ty=sy(kps[8]);
        if(lastPt && Math.hypot(tx-lastPt.x,ty-lastPt.y)>2){
          drawSegment(lastPt.x,lastPt.y,tx,ty);
        }
        lastPt={x:tx,y:ty};
      } else {
        stateEl.textContent='✋ Hand found'; lastPt=null;
      }
    } else {
      stateEl.textContent='No hand'; lastPt=null;
    }
  }
  requestAnimationFrame(loop);
}

async function init(){
  try{
    loaderMsg.textContent='Setting up TensorFlow...';
    await tf.setBackend('webgl');
    await tf.ready();

    loaderMsg.textContent='Loading hand model (first time ~5s)...';
    detector=await handPoseDetection.createDetector(
      handPoseDetection.SupportedModels.MediaPipeHands,
      { runtime:'tfjs', modelType:'lite', maxHands:1 }
    );

    loaderMsg.textContent='Requesting camera access...';
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user', width:{ideal:1280}, height:{ideal:720}},
      audio:false
    });
    video.srcObject=stream;
    await video.play();

    loader.style.transition='opacity .5s';
    loader.style.opacity='0';
    setTimeout(()=>loader.style.display='none',600);

    loop();
  }catch(e){
    loaderMsg.innerHTML='Error: '+e.message+'<br><br>Allow camera access & refresh.';
    console.error(e);
  }
}

document.getElementById('clearBtn').addEventListener('click',()=>{
  dCtx.clearRect(0,0,W,H); lastPt=null;
});

init();
</script>
</body>
</html>
